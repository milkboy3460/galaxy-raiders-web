<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GALAXY RAIDERS RANKING</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Noto+Sans+JP:wght@700&display=swap" rel="stylesheet">
    <style>
        /* ベースデザイン：深宇宙のグラデーション */
        body {
            font-family: 'Press Start 2P', 'Noto Sans JP', sans-serif;
            background: radial-gradient(circle at center top, #1a2a42 0%, #050914 100%);
            background-attachment: fixed;
            color: #e0e5ff;
            text-align: center;
            padding: 40px 20px;
            margin: 0;
            min-height: 100vh;
        }

        /* タイトル：星の瞬きのような淡い発光 */
        h1 {
            font-size: 2rem;
            margin-bottom: 40px;
            color: #ffffff;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.8), 0 0 20px rgba(100, 150, 255, 0.6);
            letter-spacing: 2px;
            animation: starlight 3s infinite alternate;
        }

        @keyframes starlight {
            from { text-shadow: 0 0 5px rgba(255, 255, 255, 0.5), 0 0 10px rgba(100, 150, 255, 0.3); }
            to { text-shadow: 0 0 15px rgba(255, 255, 255, 0.9), 0 0 25px rgba(100, 150, 255, 0.8); }
        }

        /* メインコンテナ：宇宙船のモニター風の半透明パネル */
        .board-container {
            background-color: rgba(10, 15, 30, 0.7);
            backdrop-filter: blur(5px);
            max-width: 600px;
            margin: 0 auto;
            padding: 30px;
            border: 1px solid rgba(100, 150, 255, 0.2);
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.8), inset 0 0 20px rgba(100, 150, 255, 0.05);
        }

        /* 検索エリア */
        .search-area {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 30px;
        }

        input[type="text"] {
            font-family: 'Press Start 2P', sans-serif;
            padding: 12px;
            font-size: 0.8rem;
            background: rgba(0, 0, 0, 0.5);
            color: #8ab4f8;
            border: 1px solid rgba(138, 180, 248, 0.4);
            border-radius: 4px;
            width: 60%;
            outline: none;
            transition: 0.3s;
        }

        input[type="text"]:focus {
            border-color: #8ab4f8;
            box-shadow: 0 0 10px rgba(138, 180, 248, 0.3);
        }

        button {
            font-family: 'Press Start 2P', sans-serif;
            padding: 12px 15px;
            font-size: 0.7rem;
            cursor: pointer;
            background: rgba(138, 180, 248, 0.1);
            color: #8ab4f8;
            border: 1px solid rgba(138, 180, 248, 0.5);
            border-radius: 4px;
            transition: 0.3s;
        }

        button:hover {
            background: rgba(138, 180, 248, 0.3);
            color: #ffffff;
            box-shadow: 0 0 15px rgba(138, 180, 248, 0.4);
        }

        /* リストデザイン */
        ul { list-style: none; padding: 0; margin: 0; }

        li {
            display: flex;
            justify-content: space-between;
            padding: 15px 10px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            animation: fadeIn 0.5s ease-out forwards;
            opacity: 0;
            transition: background 0.2s;
        }

        li:hover {
            background: rgba(255, 255, 255, 0.03);
        }

        @keyframes fadeIn { to { opacity: 1; } }

        /* 順位と名前：タイトルと同じ「starlight」アニメーションで淡く光らせる */
        .rank { 
            width: 50px; text-align: left; color: #8ab4f8; font-size: 0.9rem; 
            animation: starlight 3s infinite alternate 0.5s;
        }
        .name { 
            flex-grow: 1; text-align: left; color: #ffffff; font-size: 0.9rem; 
            animation: starlight 3s infinite alternate; 
        }
        
        /* スコア：世界観に合わせつつ、特別感のあるゴールドの光を設定 */
        .score { 
            color: #f1c40f; font-size: 0.9rem; 
            animation: glow-gold 2s infinite alternate;
        }

        @keyframes glow-gold {
            from { text-shadow: 0 0 5px rgba(241, 196, 15, 0.3), 0 0 10px rgba(241, 196, 15, 0.1); }
            to { text-shadow: 0 0 15px rgba(241, 196, 15, 0.8), 0 0 25px rgba(241, 196, 15, 0.5); }
        }

        /* 上位3位の装飾（上品なメタリックカラー） */
        li.rank-1 { border-left: 4px solid #f1c40f; background: linear-gradient(90deg, rgba(241, 196, 15, 0.08) 0%, transparent 100%); }
        li.rank-2 { border-left: 4px solid #bdc3c7; background: linear-gradient(90deg, rgba(189, 195, 199, 0.05) 0%, transparent 100%); }
        li.rank-3 { border-left: 4px solid #cd7f32; background: linear-gradient(90deg, rgba(205, 127, 50, 0.05) 0%, transparent 100%); }

        /* STATS表示エリア */
        .stats-container {
            display: none;
            text-align: left;
            padding: 25px;
            border: 1px solid rgba(138, 180, 248, 0.3);
            border-radius: 8px;
            background: rgba(5, 9, 20, 0.8);
            box-shadow: inset 0 0 20px rgba(0, 0, 0, 0.5);
        }
        
        .stats-header { 
            color: #8ab4f8; 
            text-align: center; 
            border-bottom: 1px solid rgba(138, 180, 248, 0.3); 
            padding-bottom: 15px; 
            margin-bottom: 25px;
            font-size: 1.2rem;
            letter-spacing: 1px;
        }
        
        .stat-line { 
            display: flex; 
            justify-content: space-between; 
            margin-bottom: 15px; 
            font-size: 0.8rem;
            color: #a0aabf;
        }

        .stat-line span:last-child {
            font-size: 0.9rem;
        }

        #stats-history-list li {
            padding: 10px 5px;
            border-bottom: 1px dashed rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body>

    <h1>GALAXY RANKING</h1>

    <div class="board-container">
        <div class="search-area">
            <input type="text" id="searchInput" placeholder="PLAYER NAME">
            <button onclick="searchStats()">STATS</button>
            <button style="background: rgba(138, 180, 248, 0.8); color: #000; font-weight: bold;" onclick="showRanking()">TOP</button>
        </div>

        <div id="ranking-section">
            <ul id="ranking-list">
                </ul>
        </div>

        <div id="stats-section" class="stats-container">
            <h2 id="stats-name" class="stats-header">PLAYER</h2>
            <div class="stat-line"><span>PLAY COUNT:</span><span id="stats-playcount" style="color: #8ab4f8;">0</span></div>
            <div class="stat-line"><span>BEST SCORE:</span><span id="stats-highscore" style="color: #f1c40f;">0</span></div>
            <div style="text-align:center; margin-top:30px; margin-bottom:10px; color:#556688; font-size:0.7rem; letter-spacing: 2px;">- RECENT LOGS -</div>
            <ul id="stats-history-list"></ul>
        </div>
    </div>

    <script>
        const API_BASE_URL = "https://unity-tetris-server.onrender.com/api";

        const rankingSection = document.getElementById("ranking-section");
        const statsSection = document.getElementById("stats-section");
        const rankingList = document.getElementById("ranking-list");

        // --- ランキング取得 ---
        async function fetchRanking() {
            try {
                rankingList.innerHTML = '<li style="justify-content: center; color: #8ab4f8;">LOADING...</li>';
                const response = await fetch(`${API_BASE_URL}/ranking`);
                if (!response.ok) throw new Error();
                
                const scores = await response.json();
                rankingList.innerHTML = "";

                if (scores.length === 0) {
                    rankingList.innerHTML = "<li style='justify-content: center; color: #a0aabf;'>NO DATA</li>";
                    return;
                }

                scores.forEach((data, index) => {
                    const li = document.createElement("li");
                    li.style.animationDelay = `${index * 0.05}s`;
                    if (index < 3) li.className = `rank-${index + 1}`;

                    const displayName = data.name || data.playerName || "GUEST";

                    li.innerHTML = `
                        <span class="rank">#${index + 1}</span>
                        <span class="name">${displayName}</span>
                        <span class="score">${data.score.toLocaleString()}</span>
                    `;
                    rankingList.appendChild(li);
                });
            } catch (e) {
                rankingList.innerHTML = '<li style="justify-content: center; color:#ff6b6b;">CONNECTION ERROR</li>';
            }
        }

        // --- 個人の戦績検索 ---
        async function searchStats() {
            const name = document.getElementById("searchInput").value.trim();
            if (!name) return;

            rankingSection.style.display = "none";
            statsSection.style.display = "block";
            document.getElementById("stats-name").textContent = "LOADING...";

            try {
                const response = await fetch(`${API_BASE_URL}/players/${encodeURIComponent(name)}/stats`);
                if (response.status === 404) {
                    document.getElementById("stats-name").textContent = "NOT FOUND";
                    return;
                }
                const stats = await response.json();
                
                document.getElementById("stats-name").textContent = stats.name;
                document.getElementById("stats-playcount").textContent = stats.playCount;
                document.getElementById("stats-highscore").textContent = stats.highScore.toLocaleString();

                const historyList = document.getElementById("stats-history-list");
                historyList.innerHTML = "";
                stats.history.forEach((s, i) => {
                    const li = document.createElement("li");
                    li.innerHTML = `<span style="font-size:0.7rem; color:#a0aabf;">LOG ${i+1}</span><span style="color:#e0e5ff;">${s.toLocaleString()}</span>`;
                    historyList.appendChild(li);
                });
            } catch (e) {
                document.getElementById("stats-name").textContent = "ERROR";
            }
        }

        function showRanking() {
            statsSection.style.display = "none";
            rankingSection.style.display = "block";
            fetchRanking();
        }

        fetchRanking();
    </script>
</body>
</html>
